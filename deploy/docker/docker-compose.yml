networks:
  localmesh:
    driver: bridge

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: localmesh-adguard
    restart: unless-stopped
    networks: [localmesh]
    ports:
      # DNS — must be reachable by LAN devices
      - "53:53/tcp"
      - "53:53/udp"
      # Admin UI (3000) intentionally NOT exposed to host.
      # Managed exclusively through the LocalMesh dashboard on :2690.

    volumes:
      - ../data/adguard/work:/opt/adguardhome/work
      - ../data/adguard/conf:/opt/adguardhome/conf

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: localmesh-nginx
    restart: unless-stopped
    networks: [localmesh]
    ports:
      # Proxy traffic — must be reachable by LAN devices
      - "80:80"
      - "443:443"
      # Admin UI (81) intentionally NOT exposed to host.
      # Managed exclusively through the LocalMesh dashboard on :2690.
    volumes:
      - ../data/nginx/data:/data
      - ../data/nginx/letsencrypt:/etc/letsencrypt

  # LocalMesh dashboard + API — the only admin interface.
  localmesh:
    build:
      context: ..
      dockerfile: Dockerfile
    image: localmesh-app:latest
    container_name: localmesh-app
    restart: unless-stopped
    networks: [localmesh]
    ports:
      - "2690:2690"
    env_file:
      - ../.env.production
    environment:
      # Docker-internal service URLs (container-to-container, no host ports needed)
      - LOCALMESH_ADGUARD_URL=http://adguard:3000
      - LOCALMESH_NPM_API_URL=http://nginx-proxy-manager:81
      - LOCALMESH_CERTS_DIR=/certs
      - LOCALMESH_CA_DIR=/ca
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../ca:/ca
      - ../certs:/certs
      - ../data/localmesh:/app/apps/api/.runtime
      - /opt/localmesh:/opt/localmesh
    depends_on:
      - adguard
      - nginx-proxy-manager
